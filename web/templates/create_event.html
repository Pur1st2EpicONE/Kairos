<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Create Event</h1>
        <p class="note">Fill the details to publish your event</p>
        <form id="create-form" class="form">
            <label>Title: <input type="text" name="title" required></label>
            <label>Description: <input type="text" name="description"></label>
            <label>Date: <input type="datetime-local" name="date" required></label>
            <label>Seats: <input type="number" name="seats" min="1" required></label>
            <label>Booking TTL (e.g., 30m, 1h): <input type="text" name="booking_ttl" required></label>
            <button type="submit">Create Event</button>
        </form>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
