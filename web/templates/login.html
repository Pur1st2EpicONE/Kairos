<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <form id="login-form" class="form">

        /></label>

    </div>
    <script src="/static/script.js"></script>
  </body>
</html>
